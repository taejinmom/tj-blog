# PostgreSQL 프로파일 (현재 미사용, 향후 전환을 위한 스텁)
#
# 활성화 방법:
#   SPRING_PROFILES_ACTIVE=postgres ./gradlew bootRun
#   또는
#   DB_PROFILE=postgres ./gradlew bootRun
#
# 주의:
#   - 실제로 전환하기 전에 아래 TODO 항목을 해결해야 한다.
#   - ddl-auto 는 운영에서 validate 로 바꾸고 스키마는 마이그레이션 도구(Flyway/Liquibase)로 관리 권장.
#   - 로컬에서 띄울 땐 docker-compose 로 postgres 컨테이너 올리는 것이 가장 간단.
#
# TODO (postgres 전환 전 체크리스트):
#   [ ] docker-compose.yml 또는 로컬 postgres 준비 (DB/유저/비밀번호 생성)
#   [ ] Flyway 또는 Liquibase 도입하여 V1__init.sql 작성 (현재는 JPA ddl-auto 로 스키마 생성 중)
#   [ ] application-postgres.yml 의 POSTGRES_* 환경변수를 실제 값으로 주입
#   [ ] 통합 테스트를 Testcontainers 기반 postgres 로 한번 돌려보기
#   [ ] refresh_tokens.token 컬럼 길이(512) 가 충분한지 확인, 필요 시 text 로 조정
spring:
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/authdb}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:authservice}
    password: ${POSTGRES_PASSWORD:authservice}
  jpa:
    hibernate:
      # 운영 전환 시 validate 로 변경하고 스키마는 Flyway 등으로 관리
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
