spring:
  application:
    name: auth-service
  profiles:
    # 기본 DB 프로파일: h2 (인메모리)
    # PostgreSQL 로 전환하려면 SPRING_PROFILES_ACTIVE=postgres 로 오버라이드
    active: ${DB_PROFILE:h2}
  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:#{null}}
            client-secret: ${GOOGLE_CLIENT_SECRET:#{null}}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/google"
          github:
            client-id: ${GITHUB_CLIENT_ID:#{null}}
            client-secret: ${GITHUB_CLIENT_SECRET:#{null}}
            scope:
              - read:user
              - user:email
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/github"

server:
  port: ${SERVER_PORT:8082}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-1234}
    access-token-expiration-ms: 900000        # 15 minutes
    refresh-token-expiration-ms: 1209600000   # 14 days
    issuer: auth-service

logging:
  level:
    org.springframework.security: INFO
    com.taejin.authservice: DEBUG
