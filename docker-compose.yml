version: '3.8'

services:
  db:
    image: postgres:15
    container_name: blog-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: blogdb
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blog-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blogdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/blogdb
      SPRING_DATASOURCE_USERNAME: blog
      SPRING_DATASOURCE_PASSWORD: blog1234
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blog-network

  jenkins:
    build:
      context: ./docker/jenkins
      dockerfile: Dockerfile
    container_name: blog-jenkins
    restart: unless-stopped
    ports:
      - "9090:8080"
      - "50000:50000"
    environment:
      JENKINS_OPTS: --httpPort=8080
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - blog-network

volumes:
  postgres_data:
  jenkins_home:

networks:
  blog-network:
    driver: bridge
